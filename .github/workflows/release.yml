name: Release

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.8)"
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-march=armv8.2-a"
          CXXFLAGS: "-march=armv8.2-a"
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          updaterJsonKeepUniversal: true
          args: --bundles dmg,updater

      - name: Save updater sig
        run: |
          echo "=== Looking for updater files ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null | sort
          # The sig content is in the release asset uploaded by tauri-action
          # Extract it from the .app.tar.gz.sig that was uploaded
          TAG="${{ inputs.tag || github.ref_name }}"
          # Download the sig from the release
          gh release download "$TAG" --pattern "*.app.tar.gz.sig" --dir updater-files --repo "${{ github.repository }}" 2>/dev/null || true
          gh release download "$TAG" --pattern "*.app.tar.gz" --dir updater-files --repo "${{ github.repository }}" 2>/dev/null || true
          ls -la updater-files/ 2>/dev/null || echo "No updater files downloaded"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater
          path: updater-files/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          updaterJsonKeepUniversal: true
          args: --bundles nsis,updater

      - name: Save updater sig
        shell: pwsh
        run: |
          Write-Host "=== Looking for updater files ==="
          Get-ChildItem -Recurse src-tauri/target/release/bundle -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          $TAG = "${{ inputs.tag || github.ref_name }}"
          New-Item -ItemType Directory -Force -Path updater-files | Out-Null
          gh release download "$TAG" --pattern "*.nsis.zip.sig" --dir updater-files --repo "${{ github.repository }}" 2>$null
          gh release download "$TAG" --pattern "*.nsis.zip" --dir updater-files --repo "${{ github.repository }}" 2>$null
          Get-ChildItem updater-files/ -ErrorAction SilentlyContinue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-updater
          path: updater-files/
          if-no-files-found: warn

  publish-updater:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS updater artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-updater
          path: artifacts/macos
        continue-on-error: true

      - name: Download Windows updater artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-updater
          path: artifacts/windows
        continue-on-error: true

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          echo "=== All artifacts ==="
          find artifacts/ -type f 2>/dev/null || echo "No artifacts found"

          # Try to get sigs from artifacts or directly from release
          mkdir -p sigs

          # macOS sig
          if [ -f artifacts/macos/*.sig ]; then
            MAC_SIG=$(cat artifacts/macos/*.sig)
          else
            gh release download "$TAG" --pattern "*.app.tar.gz.sig" --dir sigs --repo "$REPO" 2>/dev/null || true
            if ls sigs/*.sig 1>/dev/null 2>&1; then
              MAC_SIG=$(cat sigs/*.sig)
              rm sigs/*.sig
            fi
          fi

          # Windows sig
          if [ -f artifacts/windows/*.sig ]; then
            WIN_SIG=$(cat artifacts/windows/*.sig)
          else
            gh release download "$TAG" --pattern "*.nsis.zip.sig" --dir sigs --repo "$REPO" 2>/dev/null || true
            if ls sigs/*.sig 1>/dev/null 2>&1; then
              WIN_SIG=$(cat sigs/*.sig)
            fi
          fi

          echo "MAC_SIG length: ${#MAC_SIG}"
          echo "WIN_SIG length: ${#WIN_SIG}"

          # Get the actual asset names from the release
          MAC_ASSET=$(gh release view "$TAG" --json assets --jq '.assets[].name | select(endswith(".app.tar.gz"))' --repo "$REPO" || echo "")
          WIN_ASSET=$(gh release view "$TAG" --json assets --jq '.assets[].name | select(endswith(".nsis.zip"))' --repo "$REPO" || echo "")

          echo "MAC_ASSET: $MAC_ASSET"
          echo "WIN_ASSET: $WIN_ASSET"

          if [ -z "$MAC_SIG" ] && [ -z "$WIN_SIG" ]; then
            echo "ERROR: No signatures found. Cannot create latest.json"
            exit 1
          fi

          # Build platforms JSON
          PLATFORMS="{"
          if [ -n "$MAC_SIG" ] && [ -n "$MAC_ASSET" ]; then
            MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_ASSET}"
            PLATFORMS="${PLATFORMS}\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${MAC_URL}\"}"
          fi
          if [ -n "$WIN_SIG" ] && [ -n "$WIN_ASSET" ]; then
            WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_ASSET}"
            if [ -n "$MAC_SIG" ] && [ -n "$MAC_ASSET" ]; then
              PLATFORMS="${PLATFORMS},"
            fi
            PLATFORMS="${PLATFORMS}\"windows-x86_64\":{\"signature\":\"${WIN_SIG}\",\"url\":\"${WIN_URL}\"}"
          fi
          PLATFORMS="${PLATFORMS}}"

          # Create latest.json
          echo "{\"version\":\"${VERSION}\",\"notes\":\"See README for installation instructions.\",\"pub_date\":\"${DATE}\",\"platforms\":${PLATFORMS}}" | python3 -m json.tool > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
