name: Release

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.9)"
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-march=armv8.2-a"
          CXXFLAGS: "-march=armv8.2-a"
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  publish-updater:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          # List all release assets
          echo "=== Release assets ==="
          gh release view "$TAG" --json assets --jq '.assets[].name' --repo "$REPO"

          # Get signature files from the release
          mkdir -p sigs
          gh release download "$TAG" --pattern "*.sig" --dir sigs --repo "$REPO" 2>/dev/null || true
          echo "=== Downloaded sigs ==="
          ls -la sigs/

          # Find macOS sig (app.tar.gz.sig)
          MAC_SIG=""
          MAC_SIG_FILE=$(ls sigs/*.app.tar.gz.sig 2>/dev/null | head -1)
          if [ -n "$MAC_SIG_FILE" ]; then
            MAC_SIG=$(cat "$MAC_SIG_FILE")
          fi

          # Find Windows sig (nsis.zip.sig)
          WIN_SIG=""
          WIN_SIG_FILE=$(ls sigs/*.nsis.zip.sig 2>/dev/null | head -1)
          if [ -n "$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE")
          fi

          echo "MAC_SIG length: ${#MAC_SIG}"
          echo "WIN_SIG length: ${#WIN_SIG}"

          # Get asset names from release
          MAC_ASSET=$(gh release view "$TAG" --json assets --jq '[.assets[].name | select(endswith(".app.tar.gz"))] | first // empty' --repo "$REPO")
          WIN_ASSET=$(gh release view "$TAG" --json assets --jq '[.assets[].name | select(endswith(".nsis.zip"))] | first // empty' --repo "$REPO")

          echo "MAC_ASSET: $MAC_ASSET"
          echo "WIN_ASSET: $WIN_ASSET"

          if [ -z "$MAC_SIG" ] && [ -z "$WIN_SIG" ]; then
            echo "ERROR: No signatures found. Cannot create latest.json"
            echo "This means TAURI_SIGNING_PRIVATE_KEY is not generating updater artifacts."
            exit 1
          fi

          # Build platforms JSON
          PLATFORMS="{"
          FIRST=true
          if [ -n "$MAC_SIG" ] && [ -n "$MAC_ASSET" ]; then
            MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_ASSET}"
            PLATFORMS="${PLATFORMS}\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${MAC_URL}\"}"
            FIRST=false
          fi
          if [ -n "$WIN_SIG" ] && [ -n "$WIN_ASSET" ]; then
            WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_ASSET}"
            if [ "$FIRST" = false ]; then
              PLATFORMS="${PLATFORMS},"
            fi
            PLATFORMS="${PLATFORMS}\"windows-x86_64\":{\"signature\":\"${WIN_SIG}\",\"url\":\"${WIN_URL}\"}"
          fi
          PLATFORMS="${PLATFORMS}}"

          # Create latest.json
          echo "{\"version\":\"${VERSION}\",\"notes\":\"See README for installation instructions.\",\"pub_date\":\"${DATE}\",\"platforms\":${PLATFORMS}}" | python3 -m json.tool > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
