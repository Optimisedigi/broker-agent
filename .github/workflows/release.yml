name: Release

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.9)"
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-march=armv8.2-a"
          CXXFLAGS: "-march=armv8.2-a"
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  publish-updater:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Rust and tauri-cli
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install tauri-cli --version "^2"

      - name: Download, sign, and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          source "$HOME/.cargo/env"

          # The signing key is a single base64 blob. GitHub secrets may wrap it
          # across lines with trailing spaces. Strip ALL whitespace to get clean base64.
          export TAURI_SIGNING_PRIVATE_KEY=$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '[:space:]')
          echo "Clean key length: ${#TAURI_SIGNING_PRIVATE_KEY}"

          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          # List release assets
          echo "=== Release assets ==="
          gh release view "$TAG" --json assets --jq '.assets[].name' --repo "$REPO"

          # Download updater bundles
          mkdir -p bundles
          gh release download "$TAG" --pattern "*.app.tar.gz" --dir bundles --repo "$REPO" 2>/dev/null || true
          gh release download "$TAG" --pattern "*-setup.exe" --dir bundles --repo "$REPO" 2>/dev/null || true

          echo "=== Downloaded bundles ==="
          ls -la bundles/

          # Sign the bundles with tauri signer
          PLATFORMS="{"
          FIRST=true

          MAC_FILE=$(ls bundles/*.app.tar.gz 2>/dev/null | head -1)
          if [ -n "$MAC_FILE" ]; then
            echo "Signing macOS bundle..."
            cargo tauri signer sign "$MAC_FILE"
            MAC_SIG=$(cat "${MAC_FILE}.sig")
            MAC_FILENAME=$(basename "$MAC_FILE")
            MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_FILENAME}"
            PLATFORMS="${PLATFORMS}\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${MAC_URL}\"}"
            FIRST=false
            echo "macOS sig length: ${#MAC_SIG}"
          fi

          WIN_FILE=$(ls bundles/*-setup.exe 2>/dev/null | head -1)
          if [ -n "$WIN_FILE" ]; then
            echo "Signing Windows bundle..."
            cargo tauri signer sign "$WIN_FILE"
            WIN_SIG=$(cat "${WIN_FILE}.sig")
            WIN_FILENAME=$(basename "$WIN_FILE")
            WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_FILENAME}"
            if [ "$FIRST" = false ]; then
              PLATFORMS="${PLATFORMS},"
            fi
            PLATFORMS="${PLATFORMS}\"windows-x86_64\":{\"signature\":\"${WIN_SIG}\",\"url\":\"${WIN_URL}\"}"
            echo "Windows sig length: ${#WIN_SIG}"
          fi

          PLATFORMS="${PLATFORMS}}"

          # Create latest.json
          echo "{\"version\":\"${VERSION}\",\"notes\":\"See README for installation instructions.\",\"pub_date\":\"${DATE}\",\"platforms\":${PLATFORMS}}" | python3 -m json.tool > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
