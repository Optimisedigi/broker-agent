name: Release

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.6)"
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-march=armv8.2-a"
          CXXFLAGS: "-march=armv8.2-a"
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles dmg,updater

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater
          path: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Broker Agent ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See README for installation instructions."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles nsis,updater

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-updater
          path: |
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  publish-updater:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS updater artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-updater
          path: artifacts/macos

      - name: Download Windows updater artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-updater
          path: artifacts/windows

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== macOS artifacts ==="
          find artifacts/macos -type f
          echo "=== Windows artifacts ==="
          find artifacts/windows -type f

          # Read signatures
          MAC_SIG=$(cat artifacts/macos/*.sig)
          WIN_SIG=$(cat artifacts/windows/*.sig)

          # Get download URLs
          REPO="${{ github.repository }}"
          MAC_TAR=$(ls artifacts/macos/*.tar.gz | head -1)
          MAC_FILENAME=$(basename "$MAC_TAR")
          WIN_ZIP=$(ls artifacts/windows/*.nsis.zip | head -1)
          WIN_FILENAME=$(basename "$WIN_ZIP")

          MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_FILENAME}"
          WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_FILENAME}"

          # Upload the updater files to the release
          gh release upload "$TAG" "$MAC_TAR" --clobber --repo "$REPO"
          gh release upload "$TAG" "$WIN_ZIP" --clobber --repo "$REPO"

          # Create latest.json
          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See README for installation instructions.",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${WIN_URL}"
              }
            }
          }
          ENDJSON

          echo "=== latest.json ==="
          cat latest.json

          # Upload latest.json to release
          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
